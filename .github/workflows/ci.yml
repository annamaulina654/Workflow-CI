name: MLflow CI/CD

on:
  push:
    branches:
      - main

jobs:
  train-model:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install mlflow
          pip install pandas
          pip install scikit-learn

      - name: Setup MLflow Environment
        run: |
          echo "MLFLOW_TRACKING_URI=file:./mlruns" >> $GITHUB_ENV
          echo "MLFLOW_ALLOW_FILE_STORE=true" >> $GITHUB_ENV

      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local

      - name: Get RUN ID
        run: |
          RUN_ID=$(ls mlruns/0 | grep -E '^[a-f0-9]{32}$' | head -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "RUN_ID=$RUN_ID"

      - name: Debug Run Folder
        run: |
          ls -R mlruns/0/$RUN_ID

      - name: Build Docker Image
        run: |
          mlflow models build-docker \
            --model-uri runs:/${{ env.RUN_ID }}/model \
            --name telco-churn

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag telco-churn \
          ${{ secrets.DOCKER_HUB_USERNAME }}/telco-churn:latest

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_HUB_USERNAME }}/telco-churn:latest